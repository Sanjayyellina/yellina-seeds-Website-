    <!-- Hero particle logo needs these the instant it mounts — start the
         fetch as early as possible so there's no visible gap before the
         fly-in begins. crossorigin must match the crossOrigin="anonymous"
         used when these are fetched via Image() in HeroLeafParticles.jsx —
         otherwise the preload's credentials mode doesn't match the real
         request, the browser treats it as a cache miss, and fetches the
         same file a second time from scratch (a very real cause of a long
         delay before the logo starts forming on a slow connection). -->
